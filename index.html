<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 불필요한 생각</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 2. 컬러 및 타이포그래피 설정 (Refined for 'Coolness') */
        :root {
            --bg-1: #090915;
            --bg-2: #1a1a35;
            --bg-3: #2d1460;
            --text: #f6f0ff;
            --muted: rgba(246, 240, 255, 0.55);
            --glass: rgba(255, 255, 255, 0.04); /* 더 투명하게 */
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #c7a6ff;
            --line: rgba(255, 255, 255, 0.15);
            --font-sans: 'Noto Sans KR', sans-serif;
            --font-serif: 'Noto Serif KR', serif; /* 문장용 */
        }

        /* 3. 전역 스타일 및 커스텀 커서 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* 기본 커서 숨김 */
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-1);
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 4. 배경 및 노이즈 효과 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 300% 300%;
            animation: gradientBG 25s ease infinite;
            z-index: -3;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(var(--glass-border) 1px, transparent 1px);
            background-size: 8px 8px;
            opacity: 0.2;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 커스텀 마우스 글로우 및 커서 */
        #glow {
            position: fixed;
            top: 0; left: 0;
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(199, 166, 255, 0.18) 0%, transparent 75%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        #customCursor {
            position: fixed;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out, background 0.2s ease;
        }
        
        button:hover ~ #customCursor,
        a:hover ~ #customCursor {
            transform: translate(-50%, -50%) scale(2.5);
            background: var(--accent);
        }

        /* 5. 레이아웃 및 강화된 Glassmorphism 카드 */
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        .quote-card {
            max-width: 980px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(25px); /* 더 강력한 블러 */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px; /* 더 둥글게 */
            padding: 6rem 3rem;
            text-align: center;
            box-shadow: 0 48px 96px rgba(0, 0, 0, 0.4);
            /* 마우스 기울기 효과용 */
            transition: transform 0.1s ease-out, box-shadow 0.5s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .quote-card:hover {
            box-shadow: 0 64px 128px rgba(0, 0, 0, 0.5);
        }

        .eyebrow {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 0.2em; /* 더 넓은 자간 */
            margin-bottom: 2rem;
            opacity: 0.9;
            text-transform: uppercase;
        }

        .quote {
            /* Noto Serif KR로 변경, 더 크고 밀도 있게 */
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 8vw, 7rem);
            font-weight: 300;
            letter-spacing: -0.05em;
            line-height: 1.3;
            margin-bottom: 2.5rem;
            word-break: keep-all;
            /* 텍스트 전환 애니메이션 강화 */
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .quote.fade {
            opacity: 0;
            transform: translateY(15px);
        }

        .meta {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 3.5rem;
        }

        /* 6. 버튼 및 인터랙션 요소 강화 */
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--line);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 99px;
            font-size: 0.95rem;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }

        button:hover {
            background: rgba(199, 166, 255, 0.1);
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-4px) scale(1.05); /* 더 역동적으로 */
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .app-footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-align: center;
        }

        /* 강화된 파티클 캔버스 */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 7. 접근성 고려: 애니메이션 축소 */
        @media (prefers-reduced-motion: reduce) {
            .background { animation: none; background-position: 50% 50%; }
            .quote { transition: none; }
            * { transform: none !important; transition-duration: 0.01ms !important; cursor: auto !important; }
            #customCursor, #glow { display: none; }
            .quote-card { backdrop-filter: none; -webkit-backdrop-filter: none; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="noise"></div>
    <div id="glow"></div>
    <div id="customCursor"></div>
    <canvas id="particleCanvas"></canvas>

    <main class="app">
        <section class="quote-card" id="quoteCard">
            <p class="eyebrow">오늘의 불필요한 생각</p>
            <h1 class="quote" id="quoteText">로딩 중...</h1>
            <div class="meta">
                <p id="metaDate">2026.00.00 / thought no. 000</p>
                <p id="metaTemp">감정 온도: --℃ / 체감: --</p>
            </div>
            <div class="actions">
                <button id="btnRandom">다른 생각 보기</button>
                <button id="btnCopy">복사하기</button>
                <button id="btnShare">공유하기</button>
            </div>
        </section>
        <footer class="app-footer">쓸모없지만, 이상하게 필요한 문장</footer>
    </main>

    <script>
        // 1. 문장 데이터 배열
        const thoughts = [
            "문득, 저장하지 않은 파일이 더 진심 같았다.",
            "오늘도 나는 닫지 못한 탭처럼 살아 있다.",
            "쓸모없는 생각은 가끔 가장 오래 저장된다.",
            "마음에도 임시 폴더가 있다면 꽤 무거울 것이다.",
            "삭제한 줄 알았던 기억이 휴지통에서 나를 보고 있었다.",
            "완료되지 않은 일은 이상하게 나보다 오래 산다.",
            "나는 가끔 로딩 화면이 더 솔직하다고 생각한다.",
            "기다림은 가장 오래 실행되는 백그라운드 작업이다.",
            "오늘의 나는 자동 저장이 꺼진 문서 같다.",
            "불필요한 생각도 가끔은 삶의 여백을 만든다.",
            "정답을 찾다가 질문의 모서리만 닳았다.",
            "아무것도 하지 않는 시간도 조용히 무언가를 컴파일한다.",
            "어쩌면 침묵은 가장 압축률 높은 문장일지도 모른다.",
            "실패한 계획은 이상하게도 지도처럼 보인다.",
            "나는 오늘도 나를 업데이트하지 않고 재시작했다.",
            "마음의 캐시는 생각보다 잘 지워지지 않는다.",
            "가끔은 버그가 아니라 성격일 수도 있다.",
            "할 일을 미루는 동안, 미룬 일은 나를 먼저 기억했다.",
            "닫힌 창에도 아직 빛이 남아 있는 것 같았다.",
            "나는 아직 전송되지 않은 문장에 가깝다.",
            "무의미는 때때로 가장 인간적인 인터페이스다.",
            "오늘의 감정은 네트워크 오류와 비슷했다.",
            "인생에는 뒤로 가기 버튼이 없어서 다행인 날도 있다.",
            "아무도 요청하지 않은 생각이 가장 먼저 응답했다.",
            "마음은 종종 읽기 전용 파일처럼 굳어진다.",
            "기억은 압축해도 원본보다 가벼워지지 않았다.",
            "오늘 하루는 미리보기 이미지가 없었다.",
            "내 안의 오래된 알림이 아직 읽지 않음으로 남아 있다.",
            "괜찮다는 말은 가끔 가장 느린 로딩바다.",
            "별일 없는 하루가 가장 섬세한 예외 처리였다."
        ];

        // 체감 온도 텍스트 풀
        const feelings = ["저장 안 됨", "동기화 지연", "응답 없음", "읽기 전용", "오프라인", "재연결 중", "패킷 손실"];

        // 2. DOM 요소 선택
        const quoteCard = document.getElementById('quoteCard');
        const quoteText = document.getElementById('quoteText');
        const metaDate = document.getElementById('metaDate');
        const metaTemp = document.getElementById('metaTemp');
        const btnRandom = document.getElementById('btnRandom');
        const btnCopy = document.getElementById('btnCopy');
        const btnShare = document.getElementById('btnShare');
        const glow = document.getElementById('glow');
        const customCursor = document.getElementById('customCursor');

        let currentQuote = "";
        const isReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // 3. 날짜 기반 해시 및 초기화
        function getDailyData() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
            
            // 날짜 문자열로 간단한 해시 생성
            let hash = 0;
            for (let i = 0; i < dateStr.length; i++) {
                hash = dateStr.charCodeAt(i) + ((hash << 5) - hash);
            }
            hash = Math.abs(hash);

            const index = hash % thoughts.length;
            const temp = (hash % 28) + 5; // 5 ~ 32도
            const feeling = feelings[hash % feelings.length];

            return { dateStr, index, temp, feeling };
        }

        function updateQuote(text, isDaily = false, dailyData = null) {
            currentQuote = text;
            quoteText.classList.add('fade');
            
            setTimeout(() => {
                quoteText.textContent = text;
                quoteText.classList.remove('fade');
                
                if (isDaily && dailyData) {
                    const quoteNum = String(dailyData.index + 1).padStart(3, '0');
                    metaDate.textContent = `${dailyData.dateStr} / thought no. ${quoteNum}`;
                    metaTemp.textContent = `감정 온도: ${dailyData.temp}℃ / 체감: ${dailyData.feeling}`;
                }
            }, 350); // CSS transition 시간의 절반
        }

        function init() {
            const data = getDailyData();
            updateQuote(thoughts[data.index], true, data);
        }

        // 4. 이벤트 리스너: 버튼 인터랙션 및 커스텀 커서
        const randomTexts = ["다른 생각 보기", "굳이 한 번 더", "쓸데없이 새로고침", "의미 없는 클릭"];
        btnRandom.addEventListener('click', () => {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * thoughts.length);
            } while (thoughts[randomIndex] === currentQuote);
            
            updateQuote(thoughts[randomIndex]);
            btnRandom.textContent = randomTexts[Math.floor(Math.random() * randomTexts.length)];
        });

        btnCopy.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(currentQuote);
                const originalText = btnCopy.textContent;
                btnCopy.textContent = "복사됨 ✓";
                btnCopy.style.borderColor = "var(--accent)";
                btnCopy.style.color = "#fff";
                setTimeout(() => {
                    btnCopy.textContent = "복사하기";
                    btnCopy.style.borderColor = "var(--line)";
                    btnCopy.style.color = "var(--text)";
                }, 1800);
            } catch (err) {
                console.error('복사 실패:', err);
            }
        });

        btnShare.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '오늘의 불필요한 생각',
                        text: currentQuote,
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('공유 취소 또는 오류:', err);
                }
            } else {
                btnCopy.click(); // 지원하지 않으면 복사로 대체
            }
        });

        // 5. 시각 효과 강화: 커서 글로우, 커스텀 커서, 카드 기울기
        document.addEventListener('mousemove', (e) => {
            if (isReducedMotion) return;
            const x = e.clientX;
            const y = e.clientY;
            
            // 마우스 글로우 및 커스텀 커서 위치 업데이트
            glow.style.transform = `translate(calc(${x}px - 50%), calc(${y}px - 50%))`;
            customCursor.style.left = `${x}px`;
            customCursor.style.top = `${y}px`;

            // 카드 기울기 효과 계산
            const cardRect = quoteCard.getBoundingClientRect();
            const cardCenterX = cardRect.left + cardRect.width / 2;
            const cardCenterY = cardRect.top + cardRect.height / 2;
            
            const rotateX = (y - cardCenterY) / (cardRect.height / 2) * -10; // 최대 10도 기울기
            const rotateY = (x - cardCenterX) / (cardRect.width / 2) * 10;
            
            quoteCard.style.transform = `perspective(1500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // 마우스가 카드 밖으로 나가면 기울기 초기화
        quoteCard.addEventListener('mouseleave', () => {
            if (isReducedMotion) return;
            quoteCard.style.transform = `perspective(1500px) rotateX(0deg) rotateY(0deg)`;
        });

        // 6. 시각 효과 강화: 파티클 캔버스 (더 작고 많게)
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // 부드럽게 퍼지는 속도, 더 넓게
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = (Math.random() - 0.5) * 2.5 - 0.8; // 살짝 위로
                this.radius = Math.random() * 1.8 + 0.3; // 더 작게
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008; // 더 천천히 사라짐
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                // accent color 사용
                ctx.fillStyle = `rgba(199, 166, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        function handleParticles(e) {
            if (isReducedMotion) return; // 접근성: 애니메이션 최소화
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            // 파티클 생성 제한 및 빈도 증가
            if (Math.random() > 0.3 && particles.length < 150) {
                for(let i=0; i<2; i++) { // 한 번에 2개씩 생성
                    particles.push(new Particle(x, y));
                }
            }
        }

        window.addEventListener('mousemove', handleParticles);
        window.addEventListener('touchmove', handleParticles, { passive: true });

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isReducedMotion) {
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].alpha <= 0) {
                        particles.splice(i, 1);
                        i--;
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // 실행
        init();
        animateParticles();
    </script>
</body>
</html>
